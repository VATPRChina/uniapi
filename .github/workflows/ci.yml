name: Continous Integration
on: push

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build solution
        run: cargo build --release

      - name: Prepare test data
        run: |
          curl -L -o navdata.zip https://developers.navigraph.com/downloads/navigation-data/navigraph-dfd-sample-sqlite-dfdv2-2401.zip
          unzip navdata.zip -d data
      - name: Run tests
        run: cargo test --release

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_DB: vatprc
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d vatprc"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache server build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache sqlx build
        id: cache-cargo-sqlx
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-install-sqlx-cli-0.8.6

      - name: Install sqlx
        run: cargo install sqlx-cli --version 0.8.6 --locked

      - name: Build release server
        if: steps.cache-cargo-sqlx.outputs.cache-hit != 'true'
        run: cargo build --release

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: e2e/pnpm-lock.yaml

      - name: Install E2E dependencies
        run: pnpm install --frozen-lockfile
        working-directory: e2e

      - name: Prepare database
        env:
          DATABASE_URL: postgres://postgres@localhost/vatprc
        run: sqlx database setup

      - name: Prepare navdata
        run: |
          mkdir -p data
          curl --fail --location --output navdata.zip https://developers.navigraph.com/downloads/navigation-data/navigraph-dfd-sample-sqlite-dfdv2-2401.zip
          unzip -p navdata.zip ng_jeppesen_fwdfd_2401.s3db > data/navdata.db
          cp assets/test/routes.csv data/routes.csv

      - name: Run E2E tests
        run: pnpm test
        working-directory: e2e
        env:
          APP_DATABASE__URL: postgres://postgres@localhost/vatprc
          E2E_BACKEND_BUILD_MODE: release
